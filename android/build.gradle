buildscript {
  ext.getExtOrDefault = {name ->
    return rootProject.ext.has(name) ? rootProject.ext.get(name) : project.properties['FileHash_' + name]
  }

  repositories {
    google()
    mavenCentral()
  }

  dependencies {
    classpath "com.android.tools.build:gradle:8.7.2"
    // noinspection DifferentKotlinGradleVersion
    classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:${getExtOrDefault('kotlinVersion')}"
  }
}


apply plugin: "com.android.library"
apply plugin: "kotlin-android"

apply plugin: "com.facebook.react"

def getExtOrIntegerDefault(name) {
  return rootProject.ext.has(name) ? rootProject.ext.get(name) : (project.properties["FileHash_" + name]).toInteger()
}

def fileHashEngine =
  (project.findProperty("react_native_file_hash_engine")
    ?: rootProject.findProperty("react_native_file_hash_engine")
    ?: "native")
    .toString()
    .toLowerCase()

def zigCoreVersion = "unknown"
def zigCoreZon = file("../third_party/zig-files-hash/build.zig.zon")
if (zigCoreZon.exists()) {
  def match = (zigCoreZon.getText("UTF-8") =~ /version\s*=\s*"([^"]+)"/)
  if (match.find()) {
    zigCoreVersion = "v${match.group(1)}"
  }
}

if (!(fileHashEngine in ["native", "zig"])) {
  throw new GradleException("react_native_file_hash_engine must be 'native' or 'zig' (got '${fileHashEngine}')")
}

android {
  namespace "com.preeternal.filehash"

  compileSdkVersion getExtOrIntegerDefault("compileSdkVersion")

  defaultConfig {
    minSdkVersion getExtOrIntegerDefault("minSdkVersion")
    targetSdkVersion getExtOrIntegerDefault("targetSdkVersion")
    buildConfigField "String", "FILE_HASH_ENGINE", "\"${fileHashEngine}\""
    buildConfigField "String", "FILE_HASH_ZIG_CORE_VERSION", "\"${zigCoreVersion}\""

    externalNativeBuild {
      cmake {
        arguments "-DFILE_HASH_ENGINE=${fileHashEngine}"
      }
    }
  }

  buildFeatures {
    buildConfig true
  }

  externalNativeBuild {
    cmake {
      path "src/main/cpp/CMakeLists.txt"
    }
  }

  buildTypes {
    release {
      minifyEnabled false
    }
  }

  lintOptions {
    disable "GradleCompatible"
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_1_8
    targetCompatibility JavaVersion.VERSION_1_8
  }

  sourceSets {
    main {
      java.srcDirs += [
        "generated/java",
        "generated/jni"
      ]
    }
  }
}

repositories {
  mavenCentral()
  google()
}

def kotlin_version = getExtOrDefault("kotlinVersion")

dependencies {
  implementation "com.facebook.react:react-android"
  implementation "org.jetbrains.kotlin:kotlin-stdlib:$kotlin_version"
  testImplementation "junit:junit:4.13.2"
}
